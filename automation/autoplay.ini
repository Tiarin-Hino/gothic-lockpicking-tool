[settings]
; Window title of the game to auto-focus (substring match works too).
gameTitle=Gothic 1 Remake
; Seconds to wait before pressing keys (time to alt-tab if needed).
countdown=5
; Milliseconds between key presses. Increase if the game misses inputs.
delayBetween=180
; Milliseconds each key is held down. Increase if presses don't register.
holdTime=40
