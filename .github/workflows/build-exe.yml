name: Build autoplay exe

on:
  workflow_dispatch:        # run manually from the Actions tab
  push:
    tags:
      - 'v*'                # tagging v1.0.0 etc. builds + publishes a Release

permissions:
  contents: write           # needed to create the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AutoHotkey v2 + Ahk2Exe compiler
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $hdr = @{ "User-Agent" = "gh-actions"; "Authorization" = "Bearer $env:GH_TOKEN" }

          # --- AutoHotkey v2 portable zip (provides AutoHotkey64.exe base) ---
          $rel = Invoke-RestMethod "https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/latest" -Headers $hdr
          $zip = $rel.assets | Where-Object { $_.name -match '^AutoHotkey_2\..*\.zip$' -and $_.name -notmatch 'setup' } | Select-Object -First 1
          if (-not $zip) { throw "Could not find AutoHotkey v2 zip asset." }
          Write-Host "AHK zip: $($zip.name)"
          curl.exe -L -o ahk.zip $zip.browser_download_url
          Expand-Archive -Path ahk.zip -DestinationPath ahk -Force

          # --- Ahk2Exe compiler (separate repo) ---
          $rel2 = Invoke-RestMethod "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest" -Headers $hdr
          $zip2 = $rel2.assets | Where-Object { $_.name -match '\.zip$' } | Select-Object -First 1
          if (-not $zip2) { throw "Could not find Ahk2Exe zip asset." }
          Write-Host "Ahk2Exe zip: $($zip2.name)"
          curl.exe -L -o ahk2exe.zip $zip2.browser_download_url
          Expand-Archive -Path ahk2exe.zip -DestinationPath ahk2exe -Force

          Get-ChildItem -Recurse -Filter "Ahk2Exe.exe" | Select-Object FullName
          Get-ChildItem -Path ahk -Recurse -Filter "AutoHotkey64.exe" | Select-Object FullName

      - name: Compile autoplay.ahk -> gothic-autoplay.exe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ahk2exe = (Get-ChildItem -Recurse -Filter "Ahk2Exe.exe" | Select-Object -First 1).FullName
          $base    = (Get-ChildItem -Path ahk -Recurse -Filter "AutoHotkey64.exe" | Select-Object -First 1).FullName
          if (-not $ahk2exe) { throw "Ahk2Exe.exe not found." }
          if (-not $base)    { throw "AutoHotkey64.exe base not found." }
          $out = Join-Path $PWD "gothic-autoplay.exe"
          Write-Host "Compiler: $ahk2exe"
          Write-Host "Base:     $base"
          Write-Host "Output:   $out"
          & $ahk2exe /in "automation\autoplay.ahk" /out "$out" /base "$base"
          if (-not (Test-Path $out)) { throw "Compilation produced no exe." }
          Get-Item $out | Select-Object Name, Length

      - name: Bundle exe + ini
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "gothic-autoplay.exe" dist\
          Copy-Item "automation\autoplay.ini" dist\

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gothic-autoplay
          path: dist/

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gothic-autoplay.exe
            automation/autoplay.ini
