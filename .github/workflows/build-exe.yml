name: Build autoplay exe

on:
  workflow_dispatch:        # run manually from the Actions tab
  push:
    tags:
      - 'v*'                # tagging v1.0.0 etc. builds + publishes a Release

permissions:
  contents: write           # needed to create the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download AutoHotkey v2 (with Ahk2Exe compiler)
        shell: pwsh
        run: |
          curl.exe -L -o ahk.zip https://www.autohotkey.com/download/ahk-v2.zip
          Expand-Archive -Path ahk.zip -DestinationPath ahk -Force
          Get-ChildItem -Path ahk -Recurse -Filter "Ahk2Exe.exe" | Select-Object FullName
          Get-ChildItem -Path ahk -Recurse -Filter "AutoHotkey64.exe" | Select-Object FullName

      - name: Compile autoplay.ahk -> gothic-autoplay.exe
        shell: pwsh
        run: |
          $ahk2exe = (Get-ChildItem -Path ahk -Recurse -Filter "Ahk2Exe.exe" | Select-Object -First 1).FullName
          $base    = (Get-ChildItem -Path ahk -Recurse -Filter "AutoHotkey64.exe" | Select-Object -First 1).FullName
          if (-not $ahk2exe) { throw "Ahk2Exe.exe not found in AutoHotkey download." }
          if (-not $base)    { throw "AutoHotkey64.exe base not found." }
          Write-Host "Compiler: $ahk2exe"
          Write-Host "Base:     $base"
          & $ahk2exe /in "automation\autoplay.ahk" /out "gothic-autoplay.exe" /base "$base"
          if (-not (Test-Path "gothic-autoplay.exe")) { throw "Compilation produced no exe." }
          Get-Item "gothic-autoplay.exe" | Select-Object Name, Length

      - name: Bundle exe + ini
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "gothic-autoplay.exe" dist\
          Copy-Item "automation\autoplay.ini" dist\

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gothic-autoplay
          path: dist/

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gothic-autoplay.exe
            automation/autoplay.ini
